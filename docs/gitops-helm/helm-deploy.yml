name: helm-deploy

on:
  push:
    branches: [main]
    paths:
      - "microservices-chart/**"
      - ".github/workflows/helm-deploy.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-2' }}
  EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME || 'online-boutique-eks' }}
  NAMESPACE: online-boutique
  CHART_NAME: microservices-chart
  CHART_PATH: ./microservices-chart

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Helm lint
        run: helm lint "$CHART_PATH"

  package:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Helm package
        run: helm package "$CHART_PATH"
      - uses: actions/upload-artifact@v4
        with:
          name: helm-package
          path: "*.tgz"

  deploy:
    runs-on: ubuntu-latest
    needs: package
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: azure/setup-helm@v4
      - name: Configure kubeconfig
        run: aws eks update-kubeconfig --region "$AWS_REGION" --name "$EKS_CLUSTER_NAME"
      - name: Ensure namespace exists
        run: kubectl get namespace "$NAMESPACE" || kubectl create namespace "$NAMESPACE"
      - name: Ensure GHCR pull secret exists
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          kubectl create secret docker-registry my-registry-key \
            --docker-server=ghcr.io \
            --docker-username="${GHCR_USERNAME}" \
            --docker-password="${GHCR_TOKEN}" \
            -n "$NAMESPACE" \
            --dry-run=client -o yaml | kubectl apply -f -
      - name: Helm upgrade
        run: |
          helm upgrade --install "$CHART_NAME" "$CHART_PATH" \
            --namespace "$NAMESPACE" \
            --set global.imagePullSecrets[0].name=my-registry-key

  verify:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Configure kubeconfig
        run: aws eks update-kubeconfig --region "$AWS_REGION" --name "$EKS_CLUSTER_NAME"
      - name: Verify deployment
        run: |
          kubectl get pods -n "$NAMESPACE"
          kubectl get svc -n "$NAMESPACE"
          kubectl get ingress -n "$NAMESPACE"
          kubectl wait --for=condition=ready pod -l app=frontend -n "$NAMESPACE" --timeout=300s
