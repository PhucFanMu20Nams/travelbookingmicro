version: "3.9"

services:
  # ============ Leaf services (no dependencies) ============

  redis-cart:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - boutique

  productcatalogservice:
    build:
      context: ./productcatalogservice
      dockerfile: Dockerfile
    environment:
      - PORT=3550
      - DISABLE_PROFILER=1
    ports:
      - "3550:3550"
    networks:
      - boutique

  currencyservice:
    build:
      context: ./currencyservice
      dockerfile: Dockerfile
    environment:
      - PORT=7000
      - DISABLE_PROFILER=1
    ports:
      - "7001:7000"
    networks:
      - boutique

  paymentservice:
    build:
      context: ./paymentservice
      dockerfile: Dockerfile
    environment:
      - PORT=50051
      - DISABLE_PROFILER=1
    ports:
      - "50051:50051"
    networks:
      - boutique

  shippingservice:
    build:
      context: ./shippingservice
      dockerfile: Dockerfile
    environment:
      - PORT=50051
      - DISABLE_PROFILER=1
    ports:
      - "50053:50051"
    networks:
      - boutique

  adservice:
    build:
      context: ./adservice
      dockerfile: Dockerfile
    environment:
      - PORT=9555
    ports:
      - "9555:9555"
    networks:
      - boutique

  emailservice:
    build:
      context: ./emailservice
      dockerfile: Dockerfile
    platform: linux/amd64
    environment:
      - PORT=5000
      - DISABLE_PROFILER=1
    ports:
      - "5001:5000"
    networks:
      - boutique

  # ============ Services with dependencies ============

  cartservice:
    build:
      context: ./cartservice/src
      dockerfile: Dockerfile
    platform: linux/amd64
    environment:
      - REDIS_ADDR=redis-cart:6379
    ports:
      - "7070:7070"
    depends_on:
      - redis-cart
    networks:
      - boutique

  recommendationservice:
    build:
      context: ./recommendationservice
      dockerfile: Dockerfile
    platform: linux/amd64
    environment:
      - PORT=8081
      - PRODUCT_CATALOG_SERVICE_ADDR=productcatalogservice:3550
      - DISABLE_PROFILER=1
    ports:
      - "8081:8081"
    depends_on:
      - productcatalogservice
    networks:
      - boutique

  checkoutservice:
    build:
      context: ./checkoutservice
      dockerfile: Dockerfile
    environment:
      - PORT=5050
      - PRODUCT_CATALOG_SERVICE_ADDR=productcatalogservice:3550
      - SHIPPING_SERVICE_ADDR=shippingservice:50051
      - PAYMENT_SERVICE_ADDR=paymentservice:50051
      - EMAIL_SERVICE_ADDR=emailservice:5000
      - CURRENCY_SERVICE_ADDR=currencyservice:7000
      - CART_SERVICE_ADDR=cartservice:7070
    ports:
      - "5050:5050"
    depends_on:
      - productcatalogservice
      - shippingservice
      - paymentservice
      - emailservice
      - currencyservice
      - cartservice
    networks:
      - boutique

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - PORT=8080
      - PRODUCT_CATALOG_SERVICE_ADDR=productcatalogservice:3550
      - CURRENCY_SERVICE_ADDR=currencyservice:7000
      - CART_SERVICE_ADDR=cartservice:7070
      - RECOMMENDATION_SERVICE_ADDR=recommendationservice:8081
      - SHIPPING_SERVICE_ADDR=shippingservice:50051
      - CHECKOUT_SERVICE_ADDR=checkoutservice:5050
      - AD_SERVICE_ADDR=adservice:9555
      - SHOPPING_ASSISTANT_SERVICE_ADDR=""
      - ENABLE_PROFILER=0
    ports:
      - "8080:8080"
    depends_on:
      - productcatalogservice
      - currencyservice
      - cartservice
      - recommendationservice
      - shippingservice
      - checkoutservice
      - adservice
    networks:
      - boutique

  # ============ Load Generator (optional) ============

  loadgenerator:
    build:
      context: ./loadgenerator
      dockerfile: Dockerfile
    environment:
      - FRONTEND_ADDR=frontend:8080
      - USERS=10
      - RATE=1
    depends_on:
      - frontend
    networks:
      - boutique

volumes:
  redis-data:

networks:
  boutique:
    driver: bridge
