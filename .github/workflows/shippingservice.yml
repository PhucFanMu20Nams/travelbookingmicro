name: shippingservice

on:
  pull_request:
    branches: [main]
    paths:
      - "shippingservice/**"
      - ".github/scripts/update-helm-values-pr.sh"
      - ".github/workflows/shippingservice.yml"
  push:
    branches: [main]
    paths:
      - "shippingservice/**"
      - ".github/scripts/update-helm-values-pr.sh"
      - ".github/workflows/shippingservice.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  SERVICE_NAME: shippingservice
  GHCR_ORG: ${{ vars.GHCR_ORG || github.repository_owner }}
  GOTOOLCHAIN: auto

jobs:
  build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.3'
      - name: Build
        working-directory: shippingservice
        run: |
          go mod download
          go build -o shippingservice .

  test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.3'
      - name: Test
        working-directory: shippingservice
        run: |
          go mod download
          go test -v ./...

  security:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.3'
      - name: go vet
        working-directory: shippingservice
        run: go vet ./... || true

  sonar:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [test, security]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        with:
          projectBaseDir: shippingservice
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_ORGANIZATION }}_online-boutique_shippingservice
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.host.url=${{ vars.SONAR_HOST_URL || 'https://sonarcloud.io' }}
            -Dsonar.sources=.
            -Dsonar.exclusions=vendor/**,genproto/**
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  package:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./shippingservice
          file: ./shippingservice/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.GHCR_ORG }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
            ghcr.io/${{ env.GHCR_ORG }}/${{ env.SERVICE_NAME }}:latest

  update-helm:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: package
    concurrency:
      group: helm-values-pr
      cancel-in-progress: false
    env:
      HELM_REPO: ${{ vars.HELM_REPO }}
      HELM_REPO_PAT: ${{ secrets.HELM_REPO_PAT }}
      SERVICE_NAME: shippingservice
      GHCR_ORG: ${{ env.GHCR_ORG }}
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - name: Update Helm values and open PR
        run: ./.github/scripts/update-helm-values-pr.sh
