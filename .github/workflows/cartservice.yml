name: cartservice

on:
  pull_request:
    branches: [main]
    paths:
      - "cartservice/**"
      - ".github/scripts/update-helm-values-pr.sh"
      - ".github/workflows/cartservice.yml"
  push:
    branches: [main]
    paths:
      - "cartservice/**"
      - ".github/scripts/update-helm-values-pr.sh"
      - ".github/workflows/cartservice.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  SERVICE_NAME: cartservice
  GHCR_ORG: ${{ vars.GHCR_ORG || github.repository_owner }}
  SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL || 'https://sonarcloud.io' }}

jobs:
  build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Restore and build
        run: |
          dotnet restore cartservice/cartservice.sln
          dotnet build cartservice/cartservice.sln --no-restore --configuration Release

  test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Install trx2junit
        run: dotnet tool install --global trx2junit
      - name: Run tests
        run: |
          export PATH="$PATH:/home/runner/.dotnet/tools"
          dotnet restore cartservice/cartservice.sln
          dotnet test cartservice/cartservice.sln --configuration Release --logger trx --results-directory cartservice/TestResults
          trx2junit cartservice/TestResults/*.trx
      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: cartservice-test-results
          path: cartservice/TestResults/

  sonar:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: test
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
      SONAR_PROJECT_KEY: ${{ vars.SONAR_ORGANIZATION }}_online-boutique_cartservice
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Install SonarScanner
        run: dotnet tool install --global dotnet-sonarscanner
      - name: Sonar Scan
        run: |
          export PATH="$PATH:/home/runner/.dotnet/tools"
          dotnet sonarscanner begin /k:"${SONAR_PROJECT_KEY}" /o:"${SONAR_ORGANIZATION}" /d:sonar.host.url="${SONAR_HOST_URL}" /d:sonar.token="${SONAR_TOKEN}"
          dotnet build cartservice/cartservice.sln --configuration Release
          dotnet sonarscanner end /d:sonar.token="${SONAR_TOKEN}"

  package:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./cartservice/src
          file: ./cartservice/src/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.GHCR_ORG }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
            ghcr.io/${{ env.GHCR_ORG }}/${{ env.SERVICE_NAME }}:latest

  update-helm:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: package
    concurrency:
      group: helm-values-pr
      cancel-in-progress: false
    env:
      HELM_REPO: ${{ vars.HELM_REPO }}
      HELM_REPO_PAT: ${{ secrets.HELM_REPO_PAT }}
      SERVICE_NAME: cartservice
      GHCR_ORG: ${{ env.GHCR_ORG }}
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - name: Update Helm values and open PR
        run: ./.github/scripts/update-helm-values-pr.sh
