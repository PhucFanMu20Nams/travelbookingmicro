name: adservice

on:
  pull_request:
    branches: [main]
    paths:
      - "adservice/**"
      - ".github/scripts/update-helm-values-pr.sh"
      - ".github/workflows/adservice.yml"
  push:
    branches: [main]
    paths:
      - "adservice/**"
      - ".github/scripts/update-helm-values-pr.sh"
      - ".github/workflows/adservice.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  SERVICE_NAME: adservice
  GHCR_ORG: ${{ vars.GHCR_ORG || github.repository_owner }}
  SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL || 'https://sonarcloud.io' }}

jobs:
  build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Build
        working-directory: adservice
        run: ./gradlew clean build -x test

  sonar:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: build
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
      SONAR_PROJECT_KEY: ${{ vars.SONAR_ORGANIZATION }}_online-boutique_adservice
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Sonar Scan
        working-directory: adservice
        run: ./gradlew sonar -Dsonar.host.url=${SONAR_HOST_URL} -Dsonar.token=${SONAR_TOKEN}

  package:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./adservice
          file: ./adservice/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.GHCR_ORG }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
            ghcr.io/${{ env.GHCR_ORG }}/${{ env.SERVICE_NAME }}:latest

  update-helm:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: package
    concurrency:
      group: helm-values-pr
      cancel-in-progress: false
    permissions:
      contents: read
    env:
      HELM_REPO: ${{ vars.HELM_REPO }}
      HELM_REPO_PAT: ${{ secrets.HELM_REPO_PAT }}
      SERVICE_NAME: adservice
      GHCR_ORG: ${{ env.GHCR_ORG }}
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - name: Update Helm values and open PR
        run: ./.github/scripts/update-helm-values-pr.sh
