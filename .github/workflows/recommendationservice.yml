name: recommendationservice

on:
  pull_request:
    branches: [main]
    paths:
      - "recommendationservice/**"
      - ".github/scripts/update-helm-values-pr.sh"
      - ".github/workflows/recommendationservice.yml"
  push:
    branches: [main]
    paths:
      - "recommendationservice/**"
      - ".github/scripts/update-helm-values-pr.sh"
      - ".github/workflows/recommendationservice.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  SERVICE_NAME: recommendationservice
  GHCR_ORG: ${{ vars.GHCR_ORG || github.repository_owner }}

jobs:
  build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: recommendationservice/requirements.txt
      - name: Install dependencies
        working-directory: recommendationservice
        run: pip install -r requirements.txt

  test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: recommendationservice/requirements.txt
      - name: Run tests
        working-directory: recommendationservice
        run: |
          pip install -r requirements.txt
          python -m pytest || echo "No tests"

  security:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Safety scan
        working-directory: recommendationservice
        run: |
          pip install safety
          safety scan || true

  sonar:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [test, security]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        with:
          projectBaseDir: recommendationservice
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_ORGANIZATION }}_online-boutique_recommendationservice
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.host.url=${{ vars.SONAR_HOST_URL || 'https://sonarcloud.io' }}
            -Dsonar.sources=.
            -Dsonar.exclusions=.venv/**,__pycache__/**
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  package:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./recommendationservice
          file: ./recommendationservice/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.GHCR_ORG }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
            ghcr.io/${{ env.GHCR_ORG }}/${{ env.SERVICE_NAME }}:latest

  update-helm:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: package
    concurrency:
      group: helm-values-pr
      cancel-in-progress: false
    env:
      HELM_REPO: ${{ vars.HELM_REPO }}
      HELM_REPO_PAT: ${{ secrets.HELM_REPO_PAT }}
      SERVICE_NAME: recommendationservice
      GHCR_ORG: ${{ env.GHCR_ORG }}
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - name: Update Helm values and open PR
        run: ./.github/scripts/update-helm-values-pr.sh
